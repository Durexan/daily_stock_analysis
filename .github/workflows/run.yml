name: 每日股票分析自动运行

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"  # 这里修复好了

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行分析
        run: python main.py

      - name: 保存生成的文件
        uses: EndBug/add-and-commit@v9
        with:
          message: "自动更新股票分析结果"
